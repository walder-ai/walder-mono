apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-updater
  namespace: walder-apps
spec:
  schedule: "*/2 * * * *"  # Каждые 2 минуты
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: auto-updater
          containers:
          - name: updater
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "🔄 Checking for new images..."
              
              # Restart deployments to pull latest images
              kubectl rollout restart deployment analytics-service -n walder-apps
              kubectl rollout restart deployment market-fetcher -n walder-apps
              
              echo "✅ Deployments restarted"
          restartPolicy: OnFailure
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-updater
  namespace: walder-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auto-updater
  namespace: walder-apps
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auto-updater
  namespace: walder-apps
subjects:
- kind: ServiceAccount
  name: auto-updater
  namespace: walder-apps
roleRef:
  kind: Role
  name: auto-updater
  apiGroup: rbac.authorization.k8s.io 