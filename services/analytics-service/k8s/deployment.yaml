apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: walder-apps
  labels:
    app: analytics-service
    service: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: analytics-service
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: analytics-config
        - secretRef:
            name: analytics-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: walder-apps
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP 